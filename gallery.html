<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Community — Gallery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0d1b2a;
            --navy-mid: #1b2d42;
            --gold: #c9a84c;
            --cream: #f5f0e8;
            --text-muted: #8a9ab0;
        }

        body {
            background-color: var(--navy);
            color: var(--cream);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        /* NAVBAR */
        .navbar {
            background: rgba(13, 27, 42, 0.97) !important;
            border-bottom: 1px solid rgba(201, 168, 76, 0.2);
            padding: 1.1rem 0;
            backdrop-filter: blur(12px);
        }
        .navbar-brand {
            font-family: 'Playfair Display', serif;
            color: var(--gold) !important;
        }
        .nav-link { color: var(--text-muted) !important; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.1em; }
        .nav-link:hover, .nav-link.active { color: var(--gold) !important; }

        /* HEADER */
        .page-header { padding: 60px 0; text-align: center; }
        .page-header h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; }
        .page-header h1 span { color: var(--gold); }

        /* GALLERY CARDS */
        .gallery-card {
            background: var(--navy-mid);
            border: 1px solid rgba(201,168,76,0.15);
            padding: 1.5rem;
            border-radius: 8px;
            height: 100%;
            text-align: center;
        }
        .card-title { color: var(--gold); font-size: 1.1rem; margin-bottom: 1.2rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .media-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }
        img, iframe { width: 100%; height: 100%; object-fit: cover; }

        /* AUDIO STYLING */
        .audio-box { padding: 2rem 0; }
        .audio-icon { font-size: 3rem; color: var(--text-muted); margin-bottom: 1rem; }
        
        .btn-play { background: #198754; color: white; border: none; padding: 8px 25px; border-radius: 4px; }
        .btn-stop { background: #dc3545; color: white; border: none; padding: 8px 25px; border-radius: 4px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="index.html">Tech Community</a>
        <div class="navbar-nav ms-auto d-flex flex-row gap-3">
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link" href="form.html">Join Us</a>
            <a class="nav-link active" href="gallery.html">Gallery</a>
        </div>
    </div>
</nav>

<div class="page-header">
    <div class="container">
        <h1>Konten <span>Multimedia</span></h1>
    </div>
</div>

<div class="container pb-5">
    <div class="row g-4">
        <div class="col-md-4">
            <div class="gallery-card">
                <h3 class="card-title">Foto Kegiatan</h3>
                <div class="media-container">
                    <img src="polo.jpeg" alt="Kegiatan">
                </div>
            </div>
        </div>
<div class="col-md-4">
    <div class="gallery-card">
        <h3 class="card-title">Video Tutorial</h3>
        <div class="media-container">
            <iframe 
                id="ytPlayer"
                src="https://youtu.be/XtCInYeEGtM?si=OFd-usTHvUi-OQB7" 
                title="YouTube video player" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                allowfullscreen>
            </iframe>
        </div>
        <button class="btn btn-outline-warning btn-sm w-100 mt-2" onclick="showVideoInfo()">Info Video</button>
    </div>
</div>

        <div class="col-md-4">
            <div class="gallery-card">
                <h3 class="card-title">Playlist Komunitas</h3>
                <div class="audio-box">
                    <div class="audio-icon">🎧</div>
                    <audio id="myAudio" src="LAGU.mp3"></audio>
                    <div class="d-flex justify-content-center gap-2">
                        <button class="btn-play" onclick="document.getElementById('myAudio').play()">Play</button>
                        <button class="btn-stop" onclick="document.getElementById('myAudio').pause()">Stop</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
